format_version: 3.6.0
name: good_input_qualifier
title: "Good package with named inputs"
version: 0.0.1
source:
  license: "Apache-2.0"
description: "Integration package with multiple inputs of the same type using named qualifiers."
type: integration
categories:
  - observability
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
policy_templates:
  - name: nginx
    title: Nginx logs and metrics
    description: Collect logs and metrics from Nginx instances
    inputs:
      - name: filelog_otel
        type: otelcol
        title: Collect Nginx access logs via filelog OTel receiver
        description: Use the filelog OTel receiver to tail Nginx access log files.
      - name: nginx_otel
        type: otelcol
        title: Collect Nginx stub status metrics via OTel receiver
        description: Use the nginx OTel receiver to scrape Nginx stub_status metrics.
owner:
  github: elastic/foobar
  type: elastic
