format_version: 3.5.7
name: bad_input_qualifier_old_version
title: "Integration package with named inputs and old version"
version: 0.0.1
source:
  license: "Apache-2.0"
description: "Test package for integration with named inputs and old format_version"
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: nginx
    title: Nginx logs and metrics
    description: Collect logs and metrics from Nginx instances
    inputs:
      - name: filelog_otel
        type: otelcol
        title: Collect Nginx access logs via filelog OTel receiver
        description: Use the filelog OTel receiver to tail Nginx access log files.
owner:
  github: elastic/ecosystem
  type: elastic
