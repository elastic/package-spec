format_version: 3.6.1
name: bad_input_fleet_reserved_vars
title: "Bad OTel input with incorrectly typed Fleet-reserved variables"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Input package that declares Fleet-reserved variables with wrong types."
type: input
vars:
  - name: data_stream.dataset
    type: text
    title: Dataset name
    show_user: false
categories:
  - custom
conditions:
  kibana:
    version: "^9.2.0"
  elastic:
    subscription: "basic"
policy_templates:
  - name: sample
    type: traces
    title: Sample OTel metrics
    description: Collect sample OTel metrics
    input: otelcol
    template_path: input.yml.hbs
    vars:
      - name: use_apm
        type: text
        title: Enable Elastic APM Enrichment
        show_user: true
        required: false
        default: "false"
      - name: data_stream.dataset
        type: bool
        title: Dataset name
        show_user: true
        required: false
        default: false
owner:
  github: elastic/ecosystem
  type: elastic
