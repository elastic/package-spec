format_version: 3.6.4
name: bad_provider_permissions_extra_field
title: Bad package with extra field in permissions item
description: A permissions item contains resources which is a V2+ field not allowed in V1.
version: 0.0.1
type: integration
categories:
  - aws
source:
  license: "Apache-2.0"
conditions:
  kibana:
    version: '^8.0.0'
  elastic:
    subscription: basic
provider_permissions:
  - provider: aws
    permissions:
      - name: s3:GetObject
        resources:
          - arn:aws:s3:::my-bucket/*
policy_templates:
  - name: sample
    title: Sample logs
    description: Collect sample logs
    inputs:
      - type: logfile
        title: Collect sample logs from instances
        description: Collecting sample logs
owner:
  github: elastic/foobar
  type: elastic
