format_version: 3.6.0
name: bad_provider_permissions_old_version
title: Bad package using provider_permissions below spec 3.7.0
description: provider_permissions is not available before format_version 3.7.0.
version: 0.0.1
type: integration
categories:
  - aws
source:
  license: "Apache-2.0"
conditions:
  kibana:
    version: '^8.0.0'
  elastic:
    subscription: basic
# provider_permissions was introduced in 3.7.0 — should be rejected here.
provider_permissions:
  - provider: aws
    permissions:
      - name: s3:GetObject
policy_templates:
  - name: sample
    title: Sample logs
    description: Collect sample logs
    inputs:
      - type: logfile
        title: Collect sample logs from instances
        description: Collecting sample logs
owner:
  github: elastic/foobar
  type: elastic
