title: OTel traces
type: traces
streams:
  - input: otelcol
    title: Collect via OTel receiver
    description: Collecting data via OpenTelemetry receiver
    vars:
      - name: use_apm
        type: bool
        title: Enable Elastic APM Enrichment
        show_user: true
        required: false
        default: false
      - name: data_stream.dataset
        type: text
        title: Dataset name
        show_user: true
        required: false
        default: generic
