# Previously contained _embedded_ecs-* entries to test JSON schema acceptance of
# patternProperties "^_embedded_ecs". Those entries were moved to
# test/packages/bad_embedded_ecs/data_stream/logs/manifest.yml (issue #549):
# _embedded_ecs keys are build artifacts and must not appear in source packages.
# This data stream now exercises regular dynamic_templates entries only.
title: "Includes custom dynamic mappings in manifest"
type: logs
streams:
  - input: logfile
    title: Sample logs
    description: Collect sample logs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        default:
          - /var/log/*.log
elasticsearch:
  index_template:
    mappings:
      dynamic_templates:
        - string_as_keyword:
            match_mapping_type: string
            mapping:
              type: keyword
        - long_as_long:
            match_mapping_type: long
            mapping:
              type: long
