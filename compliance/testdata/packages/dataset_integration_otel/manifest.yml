format_version: 3.6.0
name: dataset_integration_otel
title: "Dataset Integration OTel package"
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Integration package with OTel input and custom data_stream.dataset variable"
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^9.2.0"
  elastic:
    subscription: "basic"
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: otel_metrics
    title: OTel Metrics
    description: Collect metrics via OTel receiver with custom dataset
    inputs:
      - type: otelcol
        title: Collect via OTel receiver
        description: Collecting metrics via OpenTelemetry receiver
owner:
  github: elastic/ecosystem
  type: elastic
