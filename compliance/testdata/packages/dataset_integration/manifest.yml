format_version: 2.8.0
name: dataset_integration
title: "Dataset Integration package"
version: 1.0.0
source:
  license: "Apache-2.0"
description: "Integration package with custom data_stream.dataset variable"
type: integration
categories:
  - custom
conditions:
  kibana.version: "^8.8.1"
  elastic.subscription: "basic"
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: generic
    title: Generic logs
    description: Collect generic logs with custom dataset
    inputs:
      - type: logfile
        title: Collect logs
        description: Collecting logs with custom dataset
owner:
  github: elastic/ecosystem
